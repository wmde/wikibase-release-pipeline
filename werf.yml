configVersion: 1
project: wikibase

---
image: wikibase
dockerfile: build/Wikibase/Dockerfile
context: .
platform: [ 'linux/amd64' ]
args:
  PHP_IMAGE_URL: $PHP_IMAGE_URL
  COMPOSER_IMAGE_URL: $COMPOSER_IMAGE_URL
  MEDIAWIKI_VERSION: $MEDIAWIKI_VERSION
tags:
  - "{{ .WBS_WIKIBASE_VERSION }}-{{ .MEDIAWIKI_VERSION }}"
  - "{{ .WBS_WIKIBASE_VERSION }}"

---
image: elasticsearch
dockerfile: build/Elasticsearch/Dockerfile
context: .
platform: [ 'linux/amd64' ]
args:
  ELASTICSEARCH_IMAGE_URL: $ELASTICSEARCH_IMAGE_URL
  ELASTICSEARCH_PLUGIN_WIKIMEDIA_EXTRA: $ELASTICSEARCH_PLUGIN_WIKIMEDIA_EXTRA
  ELASTICSEARCH_PLUGIN_WIKIMEDIA_HIGHLIGHTER: $ELASTICSEARCH_PLUGIN_WIKIMEDIA_HIGHLIGHTER
tags:
  - "{{ .WBS_ELASTICSEARCH_VERSION }}-es{{ .ELASTICSEARCH_VERSION }}"
  - "{{ .WBS_ELASTICSEARCH_VERSION }}"

---
image: wdqs
dockerfile: build/WDQS/Dockerfile
context: .
platform: [ 'linux/amd64' ]
args:
  DEBIAN_IMAGE_URL: $DEBIAN_IMAGE_URL
  JRE_IMAGE_URL: $JRE_IMAGE_URL
  WDQS_VERSION: $WDQS_VERSION
tags:
  - "{{ .WBS_WDQS_VERSION }}-wdqs{{ .WDQS_VERSION }}"
  - "{{ .WBS_WDQS_VERSION }}"

---
image: wdqs-frontend
dockerfile: build/WDQS-frontend/Dockerfile
context: .
platform: [ 'linux/amd64' ]
args:
  COMPOSER_IMAGE_URL: $COMPOSER_IMAGE_URL
  NGINX_IMAGE_URL: $NGINX_IMAGE_URL
  NODE_IMAGE_URL: $NODE_IMAGE_URL
  WDQSQUERYGUI_COMMIT: $WDQSQUERYGUI_COMMIT
tags:
  - "{{ .WBS_WDQS_FRONTEND_VERSION }}"

---
image: wdqs-proxy
dockerfile: build/WDQS-proxy/Dockerfile
context: .
platform: [ 'linux/amd64' ]
args:
  NGINX_IMAGE_URL: $NGINX_IMAGE_URL
tags:
  - "{{ .WBS_WDQS_PROXY_VERSION }}"

---
image: quickstatements
dockerfile: build/QuickStatements/Dockerfile
context: .
platform: [ 'linux/amd64' ]
args:
  COMPOSER_IMAGE_URL: $COMPOSER_IMAGE_URL
  PHP_IMAGE_URL: $PHP_IMAGE_URL
  QUICKSTATEMENTS_COMMIT: $QUICKSTATEMENTS_COMMIT
  MAGNUSTOOLS_COMMIT: $MAGNUSTOOLS_COMMIT
tags:
  - "{{ .WBS_QUICKSTATEMENTS_VERSION }}"
