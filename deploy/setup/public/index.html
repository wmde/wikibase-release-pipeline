<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>Wikibase Installer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@picocss/pico@1.5.10/css/pico.min.css"
  />
  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 1rem;
    }
    main {
      flex: 1;
      max-width: 800px;
      margin: auto;
      width: 100%;
    }
    #log-wrapper {
      background-color: #111;
      color: #eee;
      font-family: monospace;
      padding: 1em;
      max-height: 300px;
      overflow-y: auto;
      display: none;
      border-radius: 0.5rem;
      white-space: pre-wrap;
      margin-top: 1rem;
    }
    #toggle-log {
      margin-top: 1.5rem;
    }

    #optional-config {
      font-size: 0.8em;
      padding: 2em;
      border-width: 1px;
      border-color: rgb(230,230,230);
      margin-bottom: 1em;
      border-radius: 1em;
    }

    /* ansi_up class-based styles */
    .ansi-black { color: #000; }
    .ansi-red { color: #f00; }
    .ansi-green { color: #0f0; }
    .ansi-yellow { color: #ff0; }
    .ansi-blue { color: #00f; }
    .ansi-magenta { color: #f0f; }
    .ansi-cyan { color: #0ff; }
    .ansi-white { color: #fff; }
    .ansi-bright-black { color: #555; }
    .ansi-bright-red { color: #f55; }
    .ansi-bright-green { color: #5f5; }
    .ansi-bright-yellow { color: #ff5; }
    .ansi-bright-blue { color: #55f; }
    .ansi-bright-magenta { color: #f5f; }
    .ansi-bright-cyan { color: #5ff; }
    .ansi-bright-white { color: #eee; }
    .ansi-bold { font-weight: bold; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/ansi_up@5.0.0/ansi_up.min.js"></script>
</head>
<body>
  <main>
    <h2>Wikibase Suite Deploy Setup</h2>
    <h3>Configuration</h3>
    <form id="configForm">
      <label>Admin Email Address (<em>required, used for MediaWiki Admin user, etc</em>): <input name="MW_ADMIN_EMAIL" required /></label>
      <label>Wikibase Host (<em>e.g. wikibase.myhostname.com. defaults to &#x3C;SERVER-IP&#x3E;.nip.io</em>): <input name="WIKIBASE_PUBLIC_HOST" /></label>
      <label>Query Service Host (<em>defaults to query.&#x3C;SERVER-IP&#x3E;.nip.io</em>): <input name="WDQS_PUBLIC_HOST" /></label>
      <label>
        <input type="checkbox" name="METADATA_CALLBACK" checked role="switch" />
        This Wikibase should be visible in the global Wikibase directory
      </label>
      <br />
      <details name="config">
        <summary role="secondary">Advanced Options</summary>
        <label>MediaWiki Admin Name: <input name="MW_ADMIN_NAME" /></label>
        <label>MediaWiki Admin Password: <input name="MW_ADMIN_PASS" type="password" /></label>
        <label>Database Name: <input name="DB_NAME" /></label>
        <label>Database User: <input name="DB_USER" /></label>
        <label>Database Password: <input name="DB_PASS" type="password" /></label>
      </details>
      <button type="submit">Save</button>
    </form>

    <div id="status" style="display: none;"></div>
    <button id="shutdown" style="display:none;">Stop Install Webserver</button>
    <button id="toggle-log">Show Logs</button>

    <div id="log-wrapper">
      <div id="log">Loading logs...</div>
    </div>
  </main>

  <script>
    const WAIT_TIMEOUT_MS = 60000 * 10;
    const form = document.getElementById('configForm');
    const shutdownBtn = document.getElementById('shutdown');
    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');
    const logWrapper = document.getElementById('log-wrapper');
    const toggleLog = document.getElementById('toggle-log');
    const ansi_up = new AnsiUp();
    ansi_up.use_classes = true;

    form.onsubmit = async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(form).entries());
      data.METADATA_CALLBACK = form.METADATA_CALLBACK.checked ? "true" : "false";

      const res = await fetch('/write-env', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      if (res.ok) {
        const json = await res.json();
        const host = json.generated.WIKIBASE_PUBLIC_HOST;

        form.querySelectorAll('input').forEach(i => i.disabled = true);
        shutdownBtn.style.display = 'inline-block';

        statusEl.style.display = 'block';
        statusEl.innerHTML = `Waiting for your Wikibase to become available at <a href="https://${host}" target="_blank">https://${host}</a>...`;

        try {
          await waitForMainPage(host);
          statusEl.innerHTML = `✅ Your Wikibase is ready! <a href="https://${host}" target="_blank">Go to your Wikibase</a>`;
        } catch (err) {
          statusEl.innerHTML = '⚠️ Timeout: Wikibase did not respond in time. You may try refreshing manually.';
        }
      } else {
        alert('Failed to save environment. See console for details.');
      }
    };

    async function waitForMainPage(host, timeout = WAIT_TIMEOUT_MS) {
      const start = Date.now();
      const url = `https://${host}/wiki/Main_Page`;

      while (Date.now() - start < timeout) {
        try {
          const res = await fetch(url, { method: 'HEAD' });
          if (res.status === 200) return true;
        } catch {
          // Ignore and retry
        }
        await new Promise(resolve => setTimeout(resolve, 3000));
      }
      throw new Error('Timed out');
    }

    shutdownBtn.onclick = async () => {
      await fetch('/shutdown', { method: 'POST' });
    };

    toggleLog.onclick = () => {
      const isVisible = logWrapper.style.display === 'block';
      logWrapper.style.display = isVisible ? 'none' : 'block';
      toggleLog.textContent = isVisible ? 'Show Logs' : 'Hide Logs';
    };

    async function updateLogs() {
      try {
        const res = await fetch('/log');
        const text = await res.text();
        const html = ansi_up.ansi_to_html(text);
        logEl.innerHTML = html;
        logWrapper.scrollTop = logWrapper.scrollHeight;
      } catch {
        logEl.textContent = 'Error fetching log.';
      }
    }

    setInterval(updateLogs, 2000);
    updateLogs();
  </script>
</body>
</html>
