<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wikibase Installer</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      height: 100vh;
      margin: 0;
    }
    #form-area, #log-area {
      width: 50%;
      padding: 1em;
      box-sizing: border-box;
    }
    #log-area {
      background: #111;
      color: #eee;
      overflow-y: scroll;
      white-space: pre-wrap;
    }
    label {
      display: block;
      margin-top: 1em;
    }
    input, button {
      width: 100%;
      padding: 0.5em;
    }
    button {
      margin-top: 1em;
    }
    #status {
      margin-top: 1em;
      padding: 1em;
      background: #eef;
      border: 1px solid #99c;
    }

    /* ansi_up class-based styles */
    .ansi-black { color: #000; }
    .ansi-red { color: #f00; }
    .ansi-green { color: #0f0; }
    .ansi-yellow { color: #ff0; }
    .ansi-blue { color: #00f; }
    .ansi-magenta { color: #f0f; }
    .ansi-cyan { color: #0ff; }
    .ansi-white { color: #fff; }
    .ansi-bright-black { color: #555; }
    .ansi-bright-red { color: #f55; }
    .ansi-bright-green { color: #5f5; }
    .ansi-bright-yellow { color: #ff5; }
    .ansi-bright-blue { color: #55f; }
    .ansi-bright-magenta { color: #f5f; }
    .ansi-bright-cyan { color: #5ff; }
    .ansi-bright-white { color: #eee; }
    .ansi-bold { font-weight: bold; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/ansi_up@5.0.0/ansi_up.min.js"></script>
</head>
<body>
  <div id="form-area">
    <h2>Configure Wikibase</h2>
    <form id="configForm">
      <label>Admin Email (required): <input name="MW_ADMIN_EMAIL" required /></label>
      <label>Wikibase Host: <input name="WIKIBASE_PUBLIC_HOST" /></label>
      <label>WDQS Host: <input name="WDQS_PUBLIC_HOST" /></label>
      <label>Admin Name: <input name="MW_ADMIN_NAME" /></label>
      <label>Admin Password: <input name="MW_ADMIN_PASS" type="password" /></label>
      <label>DB Name: <input name="DB_NAME" /></label>
      <label>DB User: <input name="DB_USER" /></label>
      <label>DB Password: <input name="DB_PASS" type="password" /></label>
      <label>Metadata Callback Opt-In? <input name="METADATA_CALLBACK" type="checkbox" checked /></label>
      <button type="submit">Submit</button>
    </form>
    <div id="status" style="display: none;"></div>
    <button id="shutdown" style="display:none;">Stop Install Webserver</button>
  </div>
  <div id="log-area"><pre id="log">Loading logs...</pre></div>

  <script>
    const form = document.getElementById('configForm');
    const shutdownBtn = document.getElementById('shutdown');
    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');
    const ansi_up = new AnsiUp();
    ansi_up.use_classes = true;

    form.onsubmit = async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(form).entries());
      data.METADATA_CALLBACK = form.METADATA_CALLBACK.checked ? "true" : "false";

      const res = await fetch('/write-env', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      if (res.ok) {
        const json = await res.json();
        const host = json.generated.WIKIBASE_PUBLIC_HOST;

        form.querySelectorAll('input').forEach(i => i.disabled = true);
        shutdownBtn.style.display = 'block';

        statusEl.style.display = 'block';
        statusEl.textContent = `Waiting for your Wikibase to become available at https://${host}/wiki/Main_Page...`;

        try {
          await waitForMainPage(host);
          statusEl.innerHTML = `✅ Your Wikibase is ready! <a href="https://${host}" target="_blank">Go to your Wikibase</a>`;
        } catch (err) {
          statusEl.textContent = '⚠️ Timeout: Wikibase did not respond in time. You may try refreshing manually.';
        }
      } else {
        alert('Failed to save environment. See console for details.');
      }
    };

    async function waitForMainPage(host, timeout = 120000) {
      const start = Date.now();
      const url = `https://${host}/wiki/Main_Page`;

      while (Date.now() - start < timeout) {
        try {
          const res = await fetch(url, { method: 'HEAD' });
          if (res.status === 200) return true;
        } catch {
          // Ignore and retry
        }
        await new Promise(resolve => setTimeout(resolve, 3000));
      }
      throw new Error('Timed out');
    }

    shutdownBtn.onclick = async () => {
      await fetch('/shutdown', { method: 'POST' });
    };

    async function updateLogs() {
      try {
        const res = await fetch('/log');
        const text = await res.text();
        const html = ansi_up.ansi_to_html(text);
        logEl.innerHTML = html;
        logEl.parentElement.scrollTop = logEl.parentElement.scrollHeight;
      } catch {
        logEl.textContent = 'Error fetching log.';
      }
    }

    setInterval(updateLogs, 2000);
    updateLogs();
  </script>
</body>
</html>
